<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>User Profile Dropdown</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            'surface': '#f9f9ff',
            'surface-dim': '#cfdaf2',
            'surface-bright': '#f9f9ff',
            'surface-container-lowest': '#ffffff',
            'surface-container-low': '#f0f3ff',
            'brand-primary': '#6366f1',
          },
          borderRadius: {
            'eight': '8px',
          }
        }
      }
    }
  </script>
<style data-purpose="custom-shadows">
    .dropdown-shadow {
      box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.1), 0 2px 10px -2px rgba(0, 0, 0, 0.05);
    }
  </style>
</head>
<body class="bg-slate-200 flex items-center justify-center min-h-screen p-4">
<!-- BEGIN: ProfileDropdownContainer -->
<div class="w-full max-w-[320px] bg-white rounded-eight dropdown-shadow overflow-hidden border border-gray-100" data-purpose="user-profile-dropdown-card" id="profile-dropdown">
<!-- BEGIN: UserInfoHeader -->
<header class="p-5 bg-surface-bright" data-purpose="user-info-section">
<!-- User's Full Name -->
<h2 class="text-[#4b5563] text-lg font-bold leading-tight tracking-tight">
        Supattra Sriprai
      </h2>
<!-- User's Email Address -->
<p class="text-[#6b7280] text-sm mt-1 truncate">
        nihonichi.thai0137@gmail.com
      </p>
</header>
<!-- END: UserInfoHeader -->
<!-- BEGIN: ActionItemsSection -->
<nav class="border-t border-gray-100" data-purpose="dropdown-actions">
<!-- Change Password Action -->
<a class="block px-5 py-4 text-[#374151] hover:bg-surface-container-low transition-colors duration-200 text-[15px] font-medium" data-purpose="action-change-password" href="#">
        เปลี่ยนรหัสผ่าน
      </a>
<!-- Divider between main actions and destructive actions -->
<div class="border-t border-gray-100"></div>
<!-- Sign Out Action -->
<button class="w-full text-left block px-5 py-4 text-[#ef4444] hover:bg-red-50 transition-colors duration-200 text-[15px] font-semibold" data-purpose="action-sign-out" type="button">
        Sign out
      </button>
</nav>
<!-- END: ActionItemsSection -->
</div>
<!-- END: ProfileDropdownContainer -->
</body></html>
