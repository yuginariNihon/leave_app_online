<!DOCTYPE html>

<html lang="th"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ระบบยื่นใบลา - Leave Request System</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Modern Thai Font: Kanit -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<style data-purpose="typography">
    body {
      font-family: 'Kanit', sans-serif;
    }
  </style>
<style data-purpose="form-customization">
    /* Custom styling for inputs to match the professional look */
    .input-field {
      @apply w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all duration-200 bg-white/80;
    }
    .label-text {
      @apply block text-sm font-medium text-slate-700 mb-1;
    }
    .required-star {
      @apply text-red-500 ml-1;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-slate-50">
<!-- BEGIN: LeaveRequestModal -->
<div class="relative w-full max-w-2xl bg-white rounded-lg shadow-2xl overflow-hidden border border-gray-200" data-purpose="modal-container">
<!-- BEGIN: Header -->
<header class="bg-[#100d41] text-white px-6 py-4 flex justify-between items-center relative z-10">
<h1 class="text-xl font-medium tracking-wide">ยื่นใบลา</h1>
<button aria-label="Close" class="hover:bg-white/10 p-1 rounded-full transition-colors" type="button">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</header>
<!-- END: Header -->
<!-- BEGIN: FormBody -->
<main class="relative p-6 md:p-8"><!-- Localized Background Patterns -->
<div aria-hidden="true" class="absolute inset-0 overflow-hidden pointer-events-none">
<!-- Top Right Hexagon Group -->
<div class="absolute -top-10 -right-10 opacity-[0.03] text-[#100d41]">
<svg fill="currentColor" height="200" viewbox="0 0 100 100" width="200">
<path d="M50 0 L93.3 25 L93.3 75 L50 100 L6.7 75 L6.7 25 Z"></path>
<path d="M110 30 L130 45 L130 75 L110 90 L90 75 L90 45 Z" transform="translate(-30, 20) scale(0.6)"></path>
<path d="M110 30 L130 45 L130 75 L110 90 L90 75 L90 45 Z" transform="translate(-60, -10) scale(0.4)"></path>
</svg>
</div>
<!-- Bottom Left Hexagon Group -->
<div class="absolute -bottom-12 -left-12 opacity-[0.03] text-[#100d41]">
<svg fill="currentColor" height="250" viewbox="0 0 100 100" width="250">
<path d="M50 0 L93.3 25 L93.3 75 L50 100 L6.7 75 L6.7 25 Z"></path>
<path d="M110 30 L130 45 L130 75 L110 90 L90 75 L90 45 Z" transform="translate(40, -30) scale(0.5)"></path>
</svg>
</div>
</div>
<!-- Decorative Hexagons (Replicating original design elements) -->
<form class="relative z-10 space-y-6" id="leave-request-form">
<!-- Row 1: Leave Type and Date Written -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div data-purpose="input-group">
<label class="label-text" for="leave-type">ประเภทการลา<span class="required-star">*</span></label>
<select class="w-full border border-gray-300 rounded-md px-3 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white/80" id="leave-type" name="leave-type">
<option value="vacation">ลาพักร้อน</option>
<option value="sick">ลากิจ</option>
<option value="personal">ลาป่วย</option>
<option value="other">อื่นๆ</option>
</select>
</div>
<div data-purpose="input-group">
<label class="label-text" for="date-written">วันที่เขียนใบลา<span class="required-star">*</span></label>
<input class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white/80" id="date-written" name="date-written" type="date" value="2025-05-11"/>
</div>
</div>
<!-- Row 2: Start Date and End Date -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div data-purpose="input-group">
<label class="label-text" for="start-date">วันที่เริ่มต้น<span class="required-star">*</span></label>
<input class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white/80" id="start-date" name="start-date" type="date" value="2025-05-12"/>
</div>
<div data-purpose="input-group">
<label class="label-text" for="end-date">วันที่สิ้นสุด<span class="required-star">*</span></label>
<input class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white/80" id="end-date" name="end-date" type="date" value="2025-05-16"/>
</div>
</div>
<!-- Row 3: Total Days Display -->
<div class="text-[#100d41] font-medium text-lg" data-purpose="total-days-info">
          จำนวนวันลา : <span class="font-semibold" id="day-count">4</span> วัน
        </div>
<!-- Row 4: Reason for Leave -->
<div data-purpose="input-group">
<label class="label-text" for="reason">เหตุผลการลา<span class="required-star">*</span></label>
<textarea class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white/80 resize-none" id="reason" name="reason" placeholder="Type here..." rows="4"></textarea>
</div>
<!-- Row 5: File Attachment -->
<div data-purpose="input-group">
<label class="label-text" for="file-upload">แนบไฟล์ (ถ้ามี)</label>
<div class="relative">
<input class="hidden" id="file-upload" name="file-upload" type="file"/>
<label class="flex items-center justify-between w-full md:w-3/5 border border-gray-300 rounded-md px-4 py-2 bg-white cursor-pointer hover:bg-gray-50 transition-colors" for="file-upload">
<span class="text-gray-400 text-sm">Choose File...</span>
<svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</label>
</div>
</div>
</form>
</main>
<!-- END: FormBody -->
<!-- BEGIN: Footer -->
<footer class="bg-white px-6 py-4 border-t border-gray-100 flex justify-end gap-3">
<button class="px-8 py-2 border border-gray-300 text-gray-600 rounded-md hover:bg-gray-50 font-medium transition-colors" type="button">
        ปิด
      </button>
<button class="px-8 py-2 bg-[#100d41] text-white rounded-md hover:bg-[#1a1752] font-medium shadow-md transition-all active:scale-95" form="leave-request-form" type="submit">
        ส่งคำขอลา
      </button>
</footer>
<!-- END: Footer -->
</div>
<!-- END: LeaveRequestModal -->
<script data-purpose="logic-helpers">
    // Simple logic to mimic form functionality
    document.addEventListener('DOMContentLoaded', () => {
      const fileInput = document.getElementById('file-upload');
      const fileLabel = fileInput.nextElementSibling.querySelector('span');

      fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
          fileLabel.textContent = e.target.files[0].name;
          fileLabel.classList.remove('text-gray-400');
          fileLabel.classList.add('text-slate-800');
        } else {
          fileLabel.textContent = 'Choose File...';
          fileLabel.classList.add('text-gray-400');
        }
      });

      // Basic day difference calculation logic for UI responsiveness
      const startDate = document.getElementById('start-date');
      const endDate = document.getElementById('end-date');
      const dayCount = document.getElementById('day-count');

      const calculateDays = () => {
        const start = new Date(startDate.value);
        const end = new Date(endDate.value);
        if (start && end && end >= start) {
          const diffTime = Math.abs(end - start);
          const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
          // Note: In typical leave systems, end-start of same day might be 0 or 1.
          // Based on original image 12 to 16 is "4 days".
          dayCount.textContent = diffDays;
        } else {
          dayCount.textContent = '0';
        }
      };

      startDate.addEventListener('change', calculateDays);
      endDate.addEventListener('change', calculateDays);
    });
  </script>
</body></html>
