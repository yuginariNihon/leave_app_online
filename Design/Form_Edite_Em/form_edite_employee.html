<!DOCTYPE html>

<html lang="th">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>แก้ไขข้อมูลพนักงาน | Workforce Central</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Sarabun:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed": "#dae2fd",
                        "surface-bright": "#f7f9fb",
                        "background": "#f7f9fb",
                        "surface-dim": "#d8dadc",
                        "outline": "#76777d",
                        "tertiary-container": "#0b1c30",
                        "surface-container-highest": "#e0e3e5",
                        "on-tertiary-fixed": "#0b1c30",
                        "inverse-surface": "#2d3133",
                        "primary": "#000000",
                        "on-background": "#191c1e",
                        "inverse-primary": "#bec6e0",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#d3e4fe",
                        "on-primary-fixed": "#131b2e",
                        "on-secondary": "#ffffff",
                        "outline-variant": "#c6c6cd",
                        "error-container": "#ffdad6",
                        "surface-tint": "#565e74",
                        "surface-container-high": "#e6e8ea",
                        "on-primary-container": "#7c839b",
                        "secondary-fixed": "#d5e3fd",
                        "surface-container": "#eceef0",
                        "on-surface-variant": "#45464d",
                        "secondary": "#515f74",
                        "on-secondary-fixed": "#0d1c2f",
                        "primary-container": "#131b2e",
                        "primary-fixed-dim": "#bec6e0",
                        "on-surface": "#191c1e",
                        "on-tertiary-fixed-variant": "#38485d",
                        "surface-variant": "#e0e3e5",
                        "tertiary-fixed-dim": "#b7c8e1",
                        "inverse-on-surface": "#eff1f3",
                        "on-tertiary-container": "#75859d",
                        "on-primary-fixed-variant": "#3f465c",
                        "on-secondary-fixed-variant": "#3a485c",
                        "surface-container-lowest": "#ffffff",
                        "tertiary": "#000000",
                        "secondary-container": "#d5e3fd",
                        "secondary-fixed-dim": "#b9c7e0",
                        "surface-container-low": "#f2f4f6",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "surface": "#f7f9fb",
                        "on-secondary-container": "#57657b",
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "brand-navy": "#0F172A"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-desktop": "40px",
                        "xs": "4px",
                        "2xl": "48px",
                        "xl": "32px",
                        "gutter": "24px",
                        "margin-mobile": "16px",
                        "md": "16px",
                        "base": "4px",
                        "lg": "24px",
                        "3xl": "64px",
                        "sm": "8px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter", "Sarabun"],
                        "headline-lg": ["Inter", "Sarabun"],
                        "body-lg": ["Inter", "Sarabun"],
                        "body-sm": ["Inter", "Sarabun"],
                        "label-sm": ["Inter", "Sarabun"],
                        "label-md": ["Inter", "Sarabun"],
                        "display-lg": ["Inter", "Sarabun"],
                        "body-md": ["Inter", "Sarabun"]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', 'Sarabun', sans-serif;
            background-color: #F8FAFC;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }

        .form-input-focus:focus {
            outline: none;
            border-color: #2563EB;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .ambient-shadow {
            box-shadow: 0 4px 20px -2px rgba(15, 23, 42, 0.05), 0 2px 8px -1px rgba(15, 23, 42, 0.03);
        }
    </style>
</head>

<body class="bg-surface-bright text-on-surface min-h-screen flex flex-col">
    
    <main class="flex flex-1 overflow-hidden">
        <!-- Form Content Canvas -->
        <section class="flex-1 px-margin-desktop py-2xl overflow-y-auto bg-[#F8FAFC]">
            <div class="max-w-4xl mx-auto">
                <!-- Main Card -->
                <div class="bg-white rounded-2xl ambient-shadow border border-outline-variant/30 overflow-hidden">
                    <!-- Form Header -->
                    <div
                        class="bg-brand-navy p-xl flex flex-col md:flex-row justify-between items-start md:items-center gap-md">
                        <div>
                            <h2 class="font-headline-lg text-headline-lg text-white mb-xs">แก้ไขข้อมูลพนักงาน</h2>
                            <div class="inline-flex items-center gap-sm bg-white/10 px-md py-1 rounded-full">
                                <span class="material-symbols-outlined text-sm text-primary-fixed">id_card</span>
                                <span class="font-label-md text-label-md text-primary-fixed tracking-wide">รหัสพนักงาน:
                                    NFT23060047</span>
                            </div>
                        </div>
                        <div class="hidden md:block">
                            <div
                                class="w-16 h-16 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center backdrop-blur-md">
                                <span class="material-symbols-outlined text-white text-3xl">edit_note</span>
                            </div>
                        </div>
                    </div>
                    <!-- Form Body -->
                    <form class="p-xl space-y-xl">
                        <!-- Grid Layout -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-gutter gap-y-xl">
                            <!-- Name Field -->
                            <div class="flex flex-col gap-sm">
                                <label
                                    class="font-label-md text-label-md text-on-surface-variant flex items-center gap-xs">
                                    ชื่อ-นามสกุล
                                    <span class="text-error text-xs">*</span>
                                </label>
                                <input
                                    class="w-full px-md py-3 rounded-xl border border-outline-variant bg-white font-body-md text-body-md form-input-focus transition-all"
                                    type="text" value="Supattra Sripai" />
                            </div>
                            <!-- Department Field -->
                            <div class="flex flex-col gap-sm">
                                <label class="font-label-md text-label-md text-on-surface-variant">แผนก</label>
                                <div class="relative">
                                    <select
                                        class="w-full appearance-none px-md py-3 rounded-xl border border-outline-variant bg-white font-body-md text-body-md form-input-focus transition-all">
                                        <option>HR / GA</option>
                                        <option>Finance</option>
                                        <option>Operations</option>
                                        <option>Engineering</option>
                                    </select>
                                    <span
                                        class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
                                </div>
                            </div>
                            <!-- Position Field -->
                            <div class="flex flex-col gap-sm">
                                <label class="font-label-md text-label-md text-on-surface-variant">ตำแหน่ง</label>
                                <input
                                    class="w-full px-md py-3 rounded-xl border border-outline-variant bg-white font-body-md text-body-md form-input-focus transition-all"
                                    type="text" value="Supervisor" />
                            </div>
                            <!-- Section Field -->
                            <div class="flex flex-col gap-sm">
                                <label class="font-label-md text-label-md text-on-surface-variant">ส่วนงาน
                                    (SECTION)</label>
                                <input
                                    class="w-full px-md py-3 rounded-xl border border-outline-variant bg-white font-body-md text-body-md form-input-focus transition-all"
                                    type="text" value="General affair" />
                            </div>
                            <!-- Employee Type Field -->
                            <div class="flex flex-col gap-sm">
                                <label class="font-label-md text-label-md text-on-surface-variant">ประเภทพนักงาน</label>
                                <div class="relative">
                                    <select
                                        class="w-full appearance-none px-md py-3 rounded-xl border border-outline-variant bg-white font-body-md text-body-md form-input-focus transition-all">
                                        <option>PERMANENT</option>
                                        <option>CONTRACT</option>
                                        <option>INTERN</option>
                                    </select>
                                    <span
                                        class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
                                </div>
                            </div>
                            <!-- Phone Field -->
                            <div class="flex flex-col gap-sm">
                                <label class="font-label-md text-label-md text-on-surface-variant">เบอร์โทรศัพท์</label>
                                <div class="relative">
                                    <input
                                        class="w-full pl-10 pr-md py-3 rounded-xl border border-outline-variant bg-white font-body-md text-body-md form-input-focus transition-all"
                                        type="tel" value="0215304681" />
                                    <span
                                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-md">call</span>
                                </div>
                            </div>
                            <!-- Date of Birth Field -->
                            <div class="flex flex-col gap-sm">
                                <label class="font-label-md text-label-md text-on-surface-variant">วันเกิด</label>
                                <div class="relative">
                                    <input
                                        class="w-full px-md py-3 rounded-xl border border-outline-variant bg-white font-body-md text-body-md form-input-focus transition-all"
                                        type="date" />
                                    <span
                                        class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">calendar_today</span>
                                </div>
                            </div>
                            <!-- Start Date Field -->
                            <div class="flex flex-col gap-sm">
                                <label
                                    class="font-label-md text-label-md text-on-surface-variant">วันที่เริ่มงาน</label>
                                <div class="relative">
                                    <input
                                        class="w-full px-md py-3 rounded-xl border border-outline-variant bg-white font-body-md text-body-md form-input-focus transition-all"
                                        type="date" value="2023-06-01" />
                                    <span
                                        class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">event_available</span>
                                </div>
                            </div>
                            <!-- Employment Status -->
                            <div class="flex flex-col gap-sm md:col-span-2">
                                <label
                                    class="font-label-md text-label-md text-on-surface-variant">สถานะการจ้างงาน</label>
                                <div class="flex flex-wrap gap-md">
                                    <label
                                        class="flex-1 min-w-[140px] flex items-center justify-between p-md border-2 border-primary bg-primary/5 rounded-xl cursor-pointer">
                                        <div class="flex items-center gap-md">
                                            <div class="w-4 h-4 rounded-full border-4 border-primary bg-white"></div>
                                            <span
                                                class="font-body-md text-body-md font-semibold text-primary">Active</span>
                                        </div>
                                        <span class="material-symbols-outlined text-primary"
                                            style="font-variation-settings: 'FILL' 1;">check_circle</span>
                                        <input checked="" class="hidden" name="status" type="radio" value="active" />
                                    </label>
                                    <label
                                        class="flex-1 min-w-[140px] flex items-center justify-between p-md border-2 border-outline-variant bg-white rounded-xl cursor-pointer hover:border-outline transition-all">
                                        <div class="flex items-center gap-md">
                                            <div class="w-4 h-4 rounded-full border border-outline-variant bg-white">
                                            </div>
                                            <span
                                                class="font-body-md text-body-md text-on-surface-variant">Inactive</span>
                                        </div>
                                        <input class="hidden" name="status" type="radio" value="inactive" />
                                    </label>
                                    <label
                                        class="flex-1 min-w-[140px] flex items-center justify-between p-md border-2 border-outline-variant bg-white rounded-xl cursor-pointer hover:border-outline transition-all">
                                        <div class="flex items-center gap-md">
                                            <div class="w-4 h-4 rounded-full border border-outline-variant bg-white">
                                            </div>
                                            <span class="font-body-md text-body-md text-on-surface-variant">On
                                                Leave</span>
                                        </div>
                                        <input class="hidden" name="status" type="radio" value="leave" />
                                    </label>
                                </div>
                            </div>
                        </div>
                        <!-- Form Actions -->
                        <div
                            class="pt-xl border-t border-outline-variant flex flex-col sm:flex-row justify-end items-center gap-md">
                            <button
                                class="w-full sm:w-auto px-xl py-3 font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-high rounded-xl transition-all"
                                type="button">
                                ยกเลิก
                            </button>
                            <button
                                class="w-full sm:w-auto px-3xl py-3 bg-brand-navy text-white font-label-md text-label-md rounded-xl hover:bg-on-tertiary-fixed shadow-md active:scale-[0.98] transition-all flex items-center justify-center gap-sm"
                                type="submit">
                                <span class="material-symbols-outlined text-sm">save</span>
                                บันทึก
                            </button>
                        </div>
                    </form>
                </div>
                <!-- Help Section -->
                <div class="mt-xl p-lg bg-surface-container-low rounded-2xl flex items-center gap-lg">
                    <div
                        class="w-12 h-12 rounded-full bg-white flex items-center justify-center text-primary-container shrink-0">
                        <span class="material-symbols-outlined">help_outline</span>
                    </div>
                    <div>
                        <h4 class="font-label-md text-label-md text-on-surface">ต้องการความช่วยเหลือ?</h4>
                        <p class="font-body-sm text-body-sm text-on-surface-variant">
                            หากคุณมีปัญหาในการแก้ไขข้อมูลพนักงาน โปรดติดต่อแผนกไอที หรืออ่าน <a
                                class="text-primary underline decoration-primary/30 underline-offset-4"
                                href="#">คู่มือการใช้งาน</a></p>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script>
        // Simple micro-interactions
        document.querySelectorAll('input[name="status"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                document.querySelectorAll('input[name="status"]').forEach(r => {
                    const container = r.closest('label');
                    container.classList.remove('border-primary', 'bg-primary/5');
                    container.classList.add('border-outline-variant', 'bg-white');
                    container.querySelector('.font-semibold')?.classList.remove('font-semibold', 'text-primary');
                    container.querySelector('.material-symbols-outlined')?.remove();
                });

                if (e.target.checked) {
                    const container = e.target.closest('label');
                    container.classList.add('border-primary', 'bg-primary/5');
                    container.classList.remove('border-outline-variant', 'bg-white');
                    const text = container.querySelector('span');
                    text.classList.add('font-semibold', 'text-primary');

                    const checkIcon = document.createElement('span');
                    checkIcon.className = 'material-symbols-outlined text-primary';
                    checkIcon.style.fontVariationSettings = "'FILL' 1";
                    checkIcon.innerText = 'check_circle';
                    container.appendChild(checkIcon);
                }
            });
        });

        // Form submission animation
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span> กำลังบันทึก...`;
            btn.disabled = true;

            setTimeout(() => {
                btn.innerHTML = `<span class="material-symbols-outlined">check</span> บันทึกสำเร็จ`;
                btn.classList.replace('bg-brand-navy', 'bg-green-600');

                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.classList.replace('bg-green-600', 'bg-brand-navy');
                    btn.disabled = false;
                }, 2000);
            }, 1500);
        });
    </script>
</body>

</html>
